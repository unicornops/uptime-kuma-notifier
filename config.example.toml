# Uptime Kuma Configuration
# Copy this file to config.toml and update with your values

[uptime_kuma]
# Your Uptime Kuma instance URL
url = "http://localhost:3001"

# Your API key from Uptime Kuma
# Note: The metrics endpoint requires authentication if API keys are enabled in Uptime Kuma settings
api_key = "your-api-key-here"

# Update interval in seconds
update_interval = 30

# API timeout in seconds
timeout = 10

# Note: This application now uses the /metrics endpoint which provides
# Prometheus-formatted metrics including monitor status information.
# This is more reliable than the previous monitor endpoint approach.
