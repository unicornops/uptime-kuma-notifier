name: Tag release and Build packages

permissions:
  contents: write
  packages: write
  actions: read
  id-token: write

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (optional, will be auto-detected by cocogitto if omitted)"
        required: false

jobs:
  tag-release:
    name: Tag & Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      packages: write
    outputs:
      release_tag: ${{ steps.release.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check for conventional commits
        uses: cocogitto/cocogitto-action@v3.8

      - name: Get next version
        id: next_version
        run: |
          echo NEXT_VERSION=`cog bump --auto --dry-run` >> "$GITHUB_ENV"

      - name: Cocogitto tag
        id: release
        uses: cocogitto/cocogitto-action@v3
        with:
          check-latest-tag-only: true
          release: true
          git-user: "GitHubActions"
          git-user-email: "github@unicornops.ie"

      - name: Generate Changelog
        run: cog changelog --at ${{ steps.release.outputs.version }} -t full_hash > GITHUB_CHANGELOG.md

      - name: Upload github release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          body_path: GITHUB_CHANGELOG.md
          tag_name: ${{ steps.release.outputs.version }}

  build:
    name: Build macOS Package
    runs-on: macos-15
    needs: tag-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install Rust targets
        run: |
          echo "Rust version:"
          rustc -V || true
          echo "Cargo version:"
          cargo -V || true
          echo "Adding required targets (ignore if already installed)..."
          rustup target add x86_64-apple-darwin aarch64-apple-darwin || true
          echo "Installed targets:"
          rustup target list --installed || true

      - name: Install dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          CI: "true"
        run: |
          chmod +x scripts/*.sh
          ./scripts/install_dependencies.sh

      - name: Build universal + DMG
        env:
          CI: "true"
        run: |
          # Derive VERSION from the tag-release output for packaging.
          # The tag may be like 'v0.4.1' or '0.4.1' — strip a leading v/V if present.
          TAG="${{ needs.tag-release.outputs.release_tag }}"
          if [ -z "$TAG" ]; then
            # fallback to ref if tag not available
            TAG="${GITHUB_REF##*/}"
          fi
          VERSION="${TAG#v}"
          VERSION="${VERSION#V}"
          echo "Derived VERSION=${VERSION}"
          # Export VERSION to GITHUB_ENV so downstream steps and Makefile see it
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

          echo "Packaging with VERSION=${VERSION}"
          make dmg VERSION="${VERSION}"

          echo "Sanitizing DMG filenames..."
          for f in dist/*.dmg; do
            [ -e "$f" ] || continue
            sanitized="$f"
            sanitized="${sanitized//\"/}"
            sanitized="${sanitized//version = /}"
            sanitized="$(echo "$sanitized" | sed -E 's/--+/-/g')"
            if [ "$f" != "$sanitized" ]; then
              echo "Renaming $f -> $sanitized"
              mv "$f" "$sanitized"
            fi
          done
          echo "Resulting DMG files:"
          ls -la dist/*.dmg || ls -la dist/ || true

      - name: List artifacts
        run: |
          ls -la dist/ || true

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-bundle
          path: dist/*.app
          retention-days: 30

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-installer
          path: dist/*.dmg
          retention-days: 30

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-package-complete
          path: dist/
          retention-days: 30

  sign-and-notarize:
    name: Optional Code Sign & Notarize
    runs-on: macos-15
    needs: build
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
      CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
      APPLE_CERT_P12: ${{ secrets.APPLE_CERT_P12 }}
      APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Download app bundle
        uses: actions/download-artifact@v5
        with:
          name: macos-app-bundle
          path: dist/

      - name: Prepare temporary keychain and import .p12
        if: ${{ env.APPLE_CERT_P12 && env.APPLE_CERT_PASSWORD && env.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          echo "Setting up temporary keychain for code signing"

          # Write base64 P12 to file (handle newlines safely)
          echo "$APPLE_CERT_P12" | base64 --decode > /tmp/ci_signing_cert.p12

          # Create an ephemeral keychain
          KEYCHAIN_NAME=ci-build.keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          # Make keychain list include our new keychain first
          security list-keychains -s "$KEYCHAIN_NAME" $(security list-keychains | sed -E 's/^[[:space:]]*//; s/\"//g' | tr '\n' ' ')

          # Unlock and set the keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN_NAME"

          # Import the p12 including the private key, grant common tools access
          security import /tmp/ci_signing_cert.p12 -k "$KEYCHAIN_NAME" -P "$APPLE_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/productsign -T /usr/bin/security || true

          # Allow codesign to access the private key without UI prompts
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME" || true

          # Set as default for the duration of the job
          security default-keychain -s "$KEYCHAIN_NAME"

          echo "Temporary keychain $KEYCHAIN_NAME created and certificate imported"

      - name: Determine codesign identity (if not provided)
        run: |
          set -euo pipefail
          # If CODE_SIGN_IDENTITY is already provided (secret) keep it; otherwise try to detect Developer ID Application
          if [ -n "${CODE_SIGN_IDENTITY:-}" ]; then
            echo "Using provided CODE_SIGN_IDENTITY: $CODE_SIGN_IDENTITY"
            echo "CODE_SIGN_IDENTITY=$CODE_SIGN_IDENTITY" >> $GITHUB_ENV
          else
            # Try to find an identity from the keychain we just created or installed certs
            IDENT=$(security find-identity -v -p codesigning 2>/dev/null | awk -F\" '/Developer ID Application/ {print $2; exit}' || true)
            if [ -n "$IDENT" ]; then
              echo "Discovered identity: $IDENT"
              echo "CODE_SIGN_IDENTITY=$IDENT" >> $GITHUB_ENV
            else
              # Try any valid identity as fallback
              IDENT2=$(security find-identity -v -p codesigning 2>/dev/null | awk -F\" '/^[[:space:]]*[0-9]+/ {print $2; exit}' || true)
              if [ -n "$IDENT2" ]; then
                echo "Using fallback identity: $IDENT2"
                echo "CODE_SIGN_IDENTITY=$IDENT2" >> $GITHUB_ENV
              else
                echo "No code signing identity found in keychains. CODE_SIGN_IDENTITY will be empty."
                echo "CODE_SIGN_IDENTITY=" >> $GITHUB_ENV
              fi
            fi
          fi

      - name: Code sign
        run: |
          set -euo pipefail
          APP_BUNDLE=$(ls dist/*.app | head -n1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "No app bundle found in dist/"; exit 1
          fi
          echo "Signing app bundle: $APP_BUNDLE"
          # Use CODE_SIGN_IDENTITY env populated earlier; if empty, attempt to sign with Developer ID Application
          if [ -n "${CODE_SIGN_IDENTITY:-}" ]; then
            echo "codesign using identity: ${CODE_SIGN_IDENTITY}"
            codesign --force --deep --options runtime --sign "${CODE_SIGN_IDENTITY}" "${APP_BUNDLE}"
          elif security find-identity -v -p codesigning | grep -q 'Developer ID Application'; then
            codesign --force --deep --options runtime --sign "Developer ID Application" "$APP_BUNDLE"
          else
            echo "No code signing identity found, skipping signing"
          fi

      - name: Create signed DMG
        if: ${{ env.APPLE_ID && env.APPLE_ID_PASSWORD }}
        run: |
          APP_BUNDLE=$(ls dist/*.app | head -n1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "No app bundle found in dist/"; exit 1
          fi
          if [ -f Cargo.toml ]; then
            PROJECT_NAME=$(grep -E '^name\s*=' Cargo.toml | head -1 | sed -E 's/name\s*=\s*"([^"]+)".*/\1/' || true)
          fi
          if [ -z "${PROJECT_NAME:-}" ]; then
            PROJECT_NAME=$(basename "$APP_BUNDLE" .app)
            PROJECT_NAME=${PROJECT_NAME// /_}
          fi
          PROJECT_NAME_SAFE=$(echo "${PROJECT_NAME}" | tr ' ' '_' | tr '/' '_' | sed -E 's/^"+//; s/"+$//')
          DMG_NAME="dist/${PROJECT_NAME_SAFE}-signed.dmg"
          echo "Creating signed DMG: $DMG_NAME from $APP_BUNDLE"
          hdiutil create -volname "$(basename "$APP_BUNDLE" .app)" -srcfolder "$APP_BUNDLE" -ov -format UDZO "$DMG_NAME"

      - name: Notarize (script)
        if: ${{ env.APPLE_ID && env.APPLE_ID_PASSWORD }}
        run: |
          chmod +x ./scripts/notarize.sh
          ./scripts/notarize.sh

      - name: Upload signed artifacts
        if: ${{ env.APPLE_ID && env.APPLE_ID_PASSWORD }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-signed-package
          path: dist/
          retention-days: 30

      - name: Cleanup temporary keychain
        if: ${{ env.APPLE_CERT_P12 && env.APPLE_CERT_PASSWORD && env.KEYCHAIN_PASSWORD }}
        continue-on-error: true
        run: |
          set -euo pipefail
          KEYCHAIN_NAME=ci-build.keychain
          echo "Cleaning up temporary keychain: $KEYCHAIN_NAME"
          # Attempt to remove keychain from search list, then delete it
          set +e
          CURRENT_LIST=$(security list-keychains | sed -E 's/^[[:space:]]*//; s/\"//g' | tr '\n' ' ')
          NEW_LIST=$(echo "$CURRENT_LIST" | sed "s|${KEYCHAIN_NAME}||g")
          # If new list is non-empty, set it; otherwise default to system
          if [ -n "$NEW_LIST" ]; then
            security list-keychains -s $NEW_LIST || true
          fi
          security delete-keychain "$KEYCHAIN_NAME" || true
          rm -f /tmp/ci_signing_cert.p12 || true
          set -e

  attach-to-release:
    name: Attach built package files to GitHub Release
    runs-on: ubuntu-latest
    needs: [tag-release, build, sign-and-notarize]
    if: ${{ needs.tag-release.outputs.release_tag != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set env
        run: |
          echo "RELEASE_TAG=${{ needs.tag-release.outputs.release_tag }}" >> $GITHUB_ENV
          echo "REPO=${{ github.repository }}" >> $GITHUB_ENV
        shell: bash

      - name: Download package artifacts
        uses: actions/download-artifact@v5
        with:
          name: macos-package-complete
          path: dist/

      - name: Also download signed artifacts (if any)
        uses: actions/download-artifact@v5
        with:
          name: macos-signed-package
          path: dist/
        continue-on-error: true

      - name: List dist contents
        run: |
          echo "Contents of dist/:"
          ls -la dist/ || true

      - name: Prepare artifacts for upload
        run: |
          set -euo pipefail
          mkdir -p to_upload

          # Zip any .app bundles (ditto on macOS; zip fallback on ubuntu).
          # After creating the zip, sanitize the zip filename so we don't carry
          # macOS resource-fork prefixes or spaces into the release asset name.
          for a in dist/*.app; do
            [ -e "$a" ] || continue
            base=$(basename "$a")
            zip="to_upload/${base}.zip"
            echo "Packaging $a -> $zip"
            if command -v ditto >/dev/null 2>&1; then
              ditto -c -k --sequesterRsrc --keepParent "$a" "$zip"
            else
              (cd dist && zip -r "../to_upload/${base}.zip" "${base}") >/dev/null 2>&1 || true
            fi

            # Sanitize created zip name: remove leading '._' or 'name_._' fragments and replace spaces with underscores
            if [ -f "$zip" ]; then
              fname=$(basename "$zip")
              sanitized=$(echo "$fname" | sed -E 's/^(\\._)+//; s/^name_._//; s/[[:space:]]+/_/g')
              if [ -n "$sanitized" ] && [ "$sanitized" != "$fname" ]; then
                mv -f "to_upload/${fname}" "to_upload/${sanitized}" || true
              fi
            fi
          done

          # Copy DMG, other ZIP and single-file artifacts to upload folder and sanitize names.
          for f in dist/*; do
            [ -e "$f" ] || continue
            case "$f" in
              *.app) continue;;
              to_upload/*) continue;;
              *)
                fname=$(basename "$f")
                # Sanitize: remove leading macOS resource-fork markers and common accidental prefixes,
                # then collapse whitespace to underscores.
                sanitized=$(echo "$fname" | sed -E 's/^(\\._)+//; s/^name_._//; s/[[:space:]]+/_/g')
                if [ -z "$sanitized" ]; then
                  sanitized="$fname"
                fi

                dest="to_upload/${sanitized}"

                # If destination exists, append a numeric suffix before extension to avoid overwrite
                if [ -e "$dest" ]; then
                  base_no_ext="${dest%.*}"
                  ext="${dest##*.}"
                  i=1
                  while [ -e "${base_no_ext}-$i.${ext}" ]; do
                    i=$((i+1))
                  done
                  dest="${base_no_ext}-$i.${ext}"
                fi

                cp -a "$f" "$dest" || true
                ;;
            esac
          done

          # As a final pass, make sure there are no files starting with '._' or 'name_._' left in to_upload
          for tf in to_upload/*; do
            [ -e "$tf" ] || continue
            base=$(basename "$tf")
            newbase="$base"
            # strip repeated leading ._ sequences
            while [[ "$newbase" == .* ]]; do
              newbase="${newbase#._}"
            done
            # strip name_._ prefix if present
            if [[ "$newbase" == name_._* ]]; then
              newbase="${newbase#name_._}"
            fi
            # collapse whitespace
            newbase=$(echo "$newbase" | sed -E 's/[[:space:]]+/_/g')
            if [ -z "$newbase" ]; then
              newbase="$base"
            fi
            if [ "$newbase" != "$base" ]; then
              # avoid clobbering existing file
              if [ -e "to_upload/$newbase" ]; then
                base_no_ext="${newbase%.*}"
                ext="${newbase##*.}"
                j=1
                while [ -e "to_upload/${base_no_ext}-$j.${ext}" ]; do
                  j=$((j+1))
                done
                newbase="${base_no_ext}-$j.${ext}"
              fi
              mv -f "to_upload/$base" "to_upload/$newbase" || true
            fi
          done

          echo "Prepared these files for upload (sanitized names):"
          ls -la to_upload || true
        shell: bash

      - name: Get release upload URL
        id: get_upload_url
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ needs.tag-release.outputs.release_tag }}"
          REPO="${{ github.repository }}"
          echo "Looking up release for tag: $TAG in $REPO"
          api_url="https://api.github.com/repos/${REPO}/releases/tags/${TAG}"
          body=$(curl -s -H "Authorization: Bearer ${GITHUB_TOKEN}" -H "Accept: application/vnd.github+json" "$api_url")
          # If release not found, print and fail
          if [ -z "$body" ] || echo "$body" | grep -q '"message": "Not Found"'; then
            echo "Release for tag $TAG not found; response:"
            echo "$body"
            exit 1
          fi
          # Parse upload_url using python3 to avoid jq dependency
          upload_url=$(echo "$body" | python3 -c "import sys,json; print(json.load(sys.stdin).get('upload_url',''))")
          if [ -z "$upload_url" ]; then
            echo "Could not determine upload_url from release API response"
            echo "$body"
            exit 1
          fi
          # strip templated part
          upload_url="${upload_url%\{*}"
          echo "UPLOAD_URL=$upload_url" >> $GITHUB_ENV
          echo "Found upload URL: $upload_url"
        shell: bash

      - name: Upload assets to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPLOAD_URL: ${{ env.UPLOAD_URL }}
        run: |
          set -euo pipefail
          if [ -z "${UPLOAD_URL:-}" ]; then
            echo "No upload URL found; skipping upload."
            exit 1
          fi

          # Sanitize filenames to remove macOS resource-fork prefixes like '._' and
          # accidental prefixes such as 'name_._' that may be introduced when creating zips
          # or copying files cross-platform. We will compute a sanitized upload name
          # but upload the same file contents.
          for file in to_upload/*; do
            [ -e "$file" ] || continue

            orig_name=$(basename "$file")
            sanitized="$orig_name"

            # Remove common macOS resource-fork prefixes repeatedly (leading "._")
            while [[ "${sanitized}" == .* ]]; do
              sanitized="${sanitized#._}"
            done

            # Remove accidental 'name_._' prefix if present (some tools produce this)
            if [[ "${sanitized}" == name_._* ]]; then
              sanitized="${sanitized#name_._}"
            fi

            # Also guard against leading "._name_._" chains
            while [[ "${sanitized}" == .* || "${sanitized}" == name_._* ]]; do
              sanitized="${sanitized#._}"
              sanitized="${sanitized#name_._}"
            done

            # Fallback: if sanitization produced an empty name, use original
            if [ -z "${sanitized}" ]; then
              sanitized="${orig_name}"
            fi

            echo "Uploading asset: original='${orig_name}' sanitized='${sanitized}'"

            # URL-encode the sanitized filename for the upload query parameter
            ENCODED_NAME=$(python3 -c "import sys,urllib.parse as u; print(u.quote(sys.argv[1]))" "$sanitized")

            if command -v file >/dev/null 2>&1; then
              mime=$(file --mime-type -b "$file" || echo "application/octet-stream")
            else
              mime="application/octet-stream"
            fi

            response=$(curl -sS -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: $mime" \
              --data-binary @"$file" "${UPLOAD_URL}?name=${ENCODED_NAME}" || true)

            if echo "$response" | grep -q '"id":' || echo "$response" | grep -q '"state":'; then
              echo "Uploaded ${sanitized} successfully."
            else
              echo "Upload response for ${sanitized}:"
              echo "$response"
              echo "Continuing with next asset."
            fi
            echo
          done
        shell: bash
