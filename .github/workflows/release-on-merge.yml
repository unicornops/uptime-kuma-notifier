name: Release on Merge to Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: write
  packages: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: simple
          package-name: uptime-kuma-notifier

  build-and-publish:
    name: Build, Sign, Notarize, and Publish Artifacts
    runs-on: macos-15
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'

    steps:
      - name: Checkout code at release tag
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Show build environment
        run: |
          echo "Xcode version:"
          xcodebuild -version
          echo ""
          echo "Swift version:"
          swift --version
          echo ""
          echo "macOS version:"
          sw_vers

      - name: Set version for build
        id: version
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ needs.release-please.outputs.tag_name }}"
            VERSION="${VERSION#v}"
          fi

          TAG="${{ needs.release-please.outputs.tag_name }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"
          echo "Using tag: $TAG"

      - name: Build release binary
        run: swift build -c release

      - name: Setup code signing
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          KEYCHAIN_NAME="build.keychain"
          KEYCHAIN_PASSWORD="temporary_password_$(uuidgen)"

          echo "Creating temporary keychain..."
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security set-keychain-settings "$KEYCHAIN_NAME"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"
          security list-keychains -d user -s "$KEYCHAIN_NAME" $(security list-keychains -d user | sed s/\"//g)

          echo "Importing certificate..."
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"

          security import "$CERTIFICATE_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_NAME" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          echo "Installed certificates:"
          security find-identity -v -p codesigning "$KEYCHAIN_NAME"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_NAME" | grep "Developer ID Application" | head -1 | sed -n 's/.*"\(.*\)"/\1/p')
          echo "Found identity: $IDENTITY"

          CERT_TEAM_ID=$(echo "$IDENTITY" | sed -n 's/.*(\([^)]*\)).*/\1/p')
          if [ -z "$CERT_TEAM_ID" ]; then
            CERT_TEAM_ID="$TEAM_ID"
          fi

          echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
          echo "CERT_TEAM_ID=$CERT_TEAM_ID" >> $GITHUB_ENV
          echo "KEYCHAIN_NAME=$KEYCHAIN_NAME" >> $GITHUB_ENV
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV

      - name: Create app bundle
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_DIR="dist/UptimeKumaNotifier.app"

          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"

          cp .build/release/UptimeKumaNotifier "$APP_DIR/Contents/MacOS/"
          cp Info.plist "$APP_DIR/Contents/"
          cp Assets/AppIcon.icns "$APP_DIR/Contents/Resources/AppIcon.icns"

          # Update version in Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "$APP_DIR/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" "$APP_DIR/Contents/Info.plist"

          echo "App bundle created at: $APP_DIR"
          ls -lhR "$APP_DIR"

      - name: Code sign app bundle
        run: |
          APP_DIR="dist/UptimeKumaNotifier.app"

          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_NAME"

          codesign --force --deep --options runtime --timestamp \
            --entitlements UptimeKumaNotifier.entitlements \
            --sign "$SIGNING_IDENTITY" \
            --keychain "$KEYCHAIN_NAME" \
            "$APP_DIR"

          echo "Verifying code signature..."
          codesign -vvv --deep --strict "$APP_DIR"

      - name: Notarize app
        env:
          APPLE_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          APP_DIR="dist/UptimeKumaNotifier.app"

          echo "Creating ZIP for notarization..."
          ditto -c -k --keepParent "$APP_DIR" NotarizeApp.zip

          echo "Submitting to Apple for notarization..."
          xcrun notarytool submit NotarizeApp.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$TEAM_ID" \
            --password "$APPLE_PASSWORD" \
            --wait \
            --timeout 30m

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$APP_DIR"

          echo "Verifying notarization..."
          xcrun stapler validate "$APP_DIR"
          spctl -a -vv "$APP_DIR"

          rm NotarizeApp.zip

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_NAME="UptimeKumaNotifier-${VERSION}.dmg"
          VOL_NAME="Uptime Kuma Notifier ${VERSION}"
          TEMP_DMG="dist/UptimeKumaNotifier-${VERSION}-temp.dmg"

          hdiutil create \
            -volname "$VOL_NAME" \
            -srcfolder dist/UptimeKumaNotifier.app \
            -ov -format UDRW \
            "$TEMP_DMG"

          MOUNT_OUTPUT=$(hdiutil attach "$TEMP_DMG")
          DEVICE=$(echo "$MOUNT_OUTPUT" | awk '/\/Volumes\// {print $1; exit}')
          MOUNT_POINT=$(echo "$MOUNT_OUTPUT" | awk -F'\t' '/\/Volumes\// {print $3; exit}')

          if [ -z "$DEVICE" ] || [ -z "$MOUNT_POINT" ]; then
            echo "Failed to determine mounted DMG device or mount point"
            echo "$MOUNT_OUTPUT"
            exit 1
          fi

          cp Assets/AppIcon.icns "$MOUNT_POINT/.VolumeIcon.icns"
          xcrun SetFile -a C "$MOUNT_POINT"
          xcrun SetFile -a V "$MOUNT_POINT/.VolumeIcon.icns"

          hdiutil detach "$DEVICE"

          hdiutil convert "$TEMP_DMG" -format UDZO -o "dist/${DMG_NAME}"

          rm -f "$TEMP_DMG"
          echo "dmg_name=${DMG_NAME}" >> $GITHUB_ENV
          echo "DMG created: dist/${DMG_NAME}"
          ls -lh "dist/${DMG_NAME}"

      - name: Create ZIP archive
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="UptimeKumaNotifier-${VERSION}.zip"

          ditto -c -k --keepParent dist/UptimeKumaNotifier.app "dist/${ZIP_NAME}"

          echo "zip_name=${ZIP_NAME}" >> $GITHUB_ENV
          echo "ZIP created: dist/${ZIP_NAME}"
          ls -lh "dist/${ZIP_NAME}"

      - name: Calculate checksums
        run: |
          cd dist
          shasum -a 256 "${{ env.dmg_name }}" > checksums.txt
          shasum -a 256 "${{ env.zip_name }}" >> checksums.txt
          echo "Checksums:"
          cat checksums.txt

      - name: Cleanup certificate
        if: always()
        run: |
          if [ -n "${KEYCHAIN_NAME:-}" ]; then
            security delete-keychain "$KEYCHAIN_NAME" 2>/dev/null || true
          fi

      - name: Upload artifacts to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release upload "$TAG" \
            "dist/${{ env.dmg_name }}" \
            "dist/${{ env.zip_name }}" \
            "dist/checksums.txt" \
            --clobber

      - name: Release summary
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          echo "## Release Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: $TAG" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "- **Xcode**: $(xcodebuild -version | head -n 1)" >> $GITHUB_STEP_SUMMARY
          echo "- **Swift**: $(swift --version | head -n 1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Security" >> $GITHUB_STEP_SUMMARY
          echo "- Code signed with Developer ID" >> $GITHUB_STEP_SUMMARY
          echo "- Notarized by Apple" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- DMG: \`${{ env.dmg_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- ZIP: \`${{ env.zip_name }}\`" >> $GITHUB_STEP_SUMMARY
