name: Build and Package macOS App

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 0.1.0)"
        required: true
        default: "0.1.0"

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install Rust targets
        run: |
          echo "Rust version:"
          rustc -V || true
          echo "Cargo version:"
            cargo -V || true
          echo "Adding required targets (ignore if already installed)..."
          rustup target add x86_64-apple-darwin aarch64-apple-darwin || true
          echo "Installed targets:"
          rustup target list --installed || true
      - name: Install dependencies
        env:
          HOMEBREW_NO_AUTO_UPDATE: 1
          CI: "true"
        run: |
          chmod +x scripts/*.sh
          ./scripts/install_dependencies.sh
      - name: Build universal + DMG
        env:
          CI: "true"
        run: |
          make dmg
          echo "Sanitizing DMG filenames..."
          for f in dist/*.dmg; do
            [ -e "$f" ] || continue
            sanitized="$f"
            # Remove any double quotes
            sanitized="${sanitized//\"/}"
            # Remove accidental literal 'version = ' fragments
            sanitized="${sanitized//version = /}"
            # Collapse any doubled dashes created by removals
            sanitized="$(echo "$sanitized" | sed -E 's/--+/-/g')"
            if [ "$f" != "$sanitized" ]; then
              echo "Renaming $f -> $sanitized"
              mv "$f" "$sanitized"
            fi
          done
          echo "Resulting DMG files:"
          ls -la dist/*.dmg || ls -la dist/
      - name: List artifacts
        run: |
          ls -la dist/

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-bundle
          path: dist/Uptime Kuma Notifier.app/
          retention-days: 30

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-installer
          path: dist/*.dmg
          retention-days: 30

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-package-complete
          path: dist/
          retention-days: 30

  # Optional: Code signing and notarization (requires secrets)
  sign-and-notarize:
    # conditional removed; steps use env.APPLE_ID gating
    runs-on: macos-15
    needs: build
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
      CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download app bundle
        uses: actions/download-artifact@v4
        with:
          name: macos-app-bundle
          path: dist/

      # Skipping Rust toolchain & dependency installation (reusing built artifact)

      - name: Code sign
        run: |
          if [ -n "$CODE_SIGN_IDENTITY" ]; then
            codesign --force --deep --sign "$CODE_SIGN_IDENTITY" "dist/Uptime Kuma Notifier.app"
          elif security find-identity -v -p codesigning | grep -q 'Developer ID Application'; then
            codesign --force --deep --sign "Developer ID Application" "dist/Uptime Kuma Notifier.app"
          else
            echo "No code signing identity found, skipping signing"
          fi

      - name: Notarize
        if: ${{ env.APPLE_ID && env.APPLE_ID_PASSWORD }}
        run: |
          echo "Submitting for notarization..."
          ./scripts/notarize.sh

      - name: Create signed DMG
        if: ${{ env.APPLE_ID && env.APPLE_ID_PASSWORD }}
        run: |
          hdiutil create -volname "Uptime Kuma Notifier" -srcfolder "dist/Uptime Kuma Notifier.app" -ov -format UDZO "dist/Uptime_Kuma_Notifier-signed.dmg"

      - name: Upload signed artifacts
        if: ${{ env.APPLE_ID && env.APPLE_ID_PASSWORD }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-signed-package
          path: dist/
          retention-days: 30
