name: Build and Package macOS App

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g., 0.1.0)"
        required: true
        default: "0.1.0"

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-apple-darwin, aarch64-apple-darwin
          override: true

      - name: Install dependencies
        run: |
          chmod +x scripts/*.sh
          ./scripts/install_dependencies.sh

      - name: Build and package
        run: |
          make package

      - name: Create DMG
        run: |
          make dmg

      - name: List artifacts
        run: |
          ls -la dist/

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-app-bundle
          path: dist/Uptime Kuma Notifier.app/
          retention-days: 30

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg-installer
          path: dist/*.dmg
          retention-days: 30

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-package-complete
          path: dist/
          retention-days: 30

  # Optional: Code signing and notarization (requires secrets)
  sign-and-notarize:
    # conditional removed; steps use env.APPLE_ID gating
    runs-on: macos-latest
    needs: build
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      TEAM_ID: ${{ secrets.TEAM_ID }}
      CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download app bundle
        uses: actions/download-artifact@v4
        with:
          name: macos-app-bundle
          path: dist/

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          target: x86_64-apple-darwin, aarch64-apple-darwin
          override: true

      - name: Install dependencies
        run: |
          chmod +x scripts/*.sh
          ./scripts/install_dependencies.sh

      - name: Code sign
        run: |
          if [ -n "$CODE_SIGN_IDENTITY" ]; then
            codesign --force --deep --sign "$CODE_SIGN_IDENTITY" "dist/Uptime Kuma Notifier.app"
          elif security find-identity -v -p codesigning | grep -q 'Developer ID Application'; then
            codesign --force --deep --sign "Developer ID Application" "dist/Uptime Kuma Notifier.app"
          else
            echo "No code signing identity found, skipping signing"
          fi

      - name: Notarize
        if: ${{ env.APPLE_ID && env.APPLE_ID_PASSWORD }}
        run: |
          echo "Submitting for notarization..."
          ./scripts/notarize.sh

      - name: Create signed DMG
        if: ${{ env.APPLE_ID && env.APPLE_ID_PASSWORD }}
        run: |
          make dmg

      - name: Upload signed artifacts
        if: ${{ env.APPLE_ID && env.APPLE_ID_PASSWORD }}
        uses: actions/upload-artifact@v4
        with:
          name: macos-signed-package
          path: dist/
          retention-days: 30
